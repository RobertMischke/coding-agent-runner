name: release

# Publishes the package to nuget.org when a version tag is pushed (e.g. v0.1.0).
# The version is derived from the tag.
#
# Auth uses nuget.org **Trusted Publishing** (OIDC): there is NO API key to store.
# GitHub Actions mints a short-lived OIDC token; the NuGet/login action exchanges
# it for a temporary key, validated against the Trusted Publishing policy on
# nuget.org (package owner RobertMischke2, repo RobertMischke/coding-agent-runner,
# workflow release.yml).
#
# To cut a release: `scripts/release.sh 0.1.0` (or push a `v0.1.0` tag manually).
on:
  push:
    tags: [ 'v*.*.*' ]

jobs:
  publish:
    name: pack & publish to nuget.org
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required to request the OIDC token for Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --no-restore -c Release

      - name: Pack
        run: >
          dotnet pack src/CodingAgentRunner/CodingAgentRunner.csproj
          --no-restore -c Release
          -p:Version=${{ steps.ver.outputs.version }}
          -o artifacts

      - name: Authenticate to nuget.org (Trusted Publishing / OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: RobertMischke2

      - name: Push to nuget.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

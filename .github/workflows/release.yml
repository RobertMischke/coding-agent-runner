name: release

# Publishes the package to nuget.org when a version tag is pushed (e.g. v0.1.0).
# The version is derived from the tag. The nuget.org API key is read ONLY from the
# repository secret NUGET_API_KEY — it is never stored in the repo.
#
# To cut a release: `scripts/release.sh 0.1.0` (or push a `v0.1.0` tag manually).
on:
  push:
    tags: [ 'v*.*.*' ]

jobs:
  publish:
    name: pack & push to nuget.org
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --no-restore -c Release

      - name: Pack
        run: >
          dotnet pack src/CodingAgentRunner/CodingAgentRunner.csproj
          --no-restore -c Release
          -p:Version=${{ steps.ver.outputs.version }}
          -o artifacts

      - name: Push to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY repository secret is not set; cannot publish." >&2
            exit 1
          fi
          dotnet nuget push "artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
